<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Cleaner</title>
  <!-- SDK must start loading early; it fires window.onSpotifyWebPlaybackSDKReady when ready -->
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

  <div class="swipe-overlay" id="swipe-overlay"></div>

  <header>
    <div class="header-left">
      <div class="logo-dot">
        <svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      </div>
      <span class="app-title">Spotify Cleaner</span>
    </div>
    <div class="user-info">
      <img class="avatar" id="user-avatar" src="" alt="" />
      <span id="user-name"></span>
      <a href="/logout"><button class="logout-btn">Log out</button></a>
    </div>
  </header>

  <main>

    <!-- Step 1: Choose source -->
    <div id="step-select">
      <h2 class="step-title">What do you want to clean?</h2>
      <p class="step-sub">Pick a source to review your tracks one by one.</p>

      <div class="source-options">
        <div class="source-card" id="card-liked" onclick="selectSource('liked')">
          <div class="icon">♥</div>
          <div class="label">Liked Songs</div>
          <div class="desc">Your saved tracks</div>
        </div>
        <div class="source-card" id="card-playlist" onclick="selectSource('playlist')">
          <div class="icon">≡</div>
          <div class="label">A Playlist</div>
          <div class="desc">Any playlist you own</div>
        </div>
      </div>

      <div id="playlist-picker" class="hidden">
        <div class="picker-label">Select a playlist</div>
        <div class="playlist-list" id="playlist-list"></div>
      </div>

      <button class="start-btn" id="start-btn" disabled onclick="startReview()">Start Reviewing</button>
    </div>

    <!-- Step 2: Loading -->
    <div id="step-loading" class="hidden">
      <div class="spinner"></div>
      <p class="loading-text" id="loading-text">Loading tracks…</p>
    </div>

    <!-- Step 3: Review -->
    <div id="step-review" class="hidden">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>

      <div class="review-top-row">
        <div class="track-counter" id="track-counter"></div>
        <button class="removals-btn hidden" id="removals-btn" onclick="openRemovalsPanel()">
          Review removals <span class="badge" id="removals-badge">0</span>
        </button>
      </div>

      <div class="track-card">
        <div class="album-art-wrap">
          <img class="album-art" id="album-art" src="" alt="" />
          <div class="no-art hidden" id="no-art">🎵</div>
          <div class="audio-indicator" id="audio-indicator">
            <div class="wave-bar" style="height:8px"></div>
            <div class="wave-bar" style="height:12px"></div>
            <div class="wave-bar" style="height:6px"></div>
            <div class="wave-bar" style="height:10px"></div>
          </div>
        </div>
        <div class="track-info">
          <div class="track-name" id="track-name"></div>
          <div class="track-artist" id="track-artist"></div>
          <div class="track-album" id="track-album"></div>
        </div>
      </div>

      <div class="action-row">
        <button class="action-btn btn-remove" id="btn-remove" onclick="decide('remove')">
          <span class="icon">←</span>
          <span>REMOVE</span>
        </button>
        <button class="action-btn btn-keep" id="btn-keep" onclick="decide('keep')">
          <span class="icon">→</span>
          <span>KEEP</span>
        </button>
      </div>

      <div class="volume-row">
        <button class="btn-mute" id="btn-mute" onclick="toggleMute()">🔊</button>
        <input type="range" class="volume-slider" id="volume-slider"
               min="0" max="100" value="50" oninput="handleVolumeChange(this.value)" />
      </div>

      <div class="secondary-row">
        <button class="btn-secondary" id="btn-undo" onclick="undoLast()" disabled>↩ Undo</button>
        <button class="btn-secondary" onclick="decide('skip')">↓ Skip</button>
      </div>

      <div class="key-hints">
        <kbd>←</kbd> Remove &nbsp;·&nbsp; <kbd>→</kbd> Keep &nbsp;·&nbsp;
        <kbd>↓</kbd>/<kbd>Space</kbd> Skip &nbsp;·&nbsp; <kbd>Z</kbd> Undo
      </div>
    </div>

    <!-- Step 4: Summary -->
    <div id="step-summary" class="hidden">
      <div class="summary-header">
        <span class="summary-count" id="remove-count">0</span>
        <p style="color:var(--muted); margin-top:0.5rem;" id="summary-subtitle"></p>
      </div>
      <div id="summary-list-wrap"></div>
      <button class="confirm-btn" id="confirm-btn" onclick="commitDeletions()">Delete these tracks from Spotify</button>
      <button class="cancel-btn" onclick="goToSelect()">Cancel, start over</button>
    </div>

    <!-- Step 5: Done -->
    <div id="step-done" class="hidden">
      <div class="done-icon">✓</div>
      <div class="done-title" id="done-title">Done!</div>
      <p class="done-sub" id="done-sub"></p>
      <button class="restart-btn" onclick="goToSelect()">Clean another source</button>
    </div>

  </main>

  <!-- Removals panel modal -->
  <div id="removals-modal" class="modal-overlay hidden">
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title">Marked for removal</span>
        <div class="modal-header-actions">
          <button class="btn-recover-all" id="btn-recover-all" onclick="recoverAllFromPanel()">Recover all</button>
          <button class="btn-delete-all" id="btn-delete-all" onclick="deleteAllFromPanel()">Delete all now</button>
          <button class="btn-close-modal" onclick="closeRemovalsPanel()">✕</button>
        </div>
      </div>
      <div class="modal-track-list" id="modal-track-list"></div>
    </div>
  </div>

  <!-- Load order: api → ui → prefetch → player → auth → app (boot: calls initDOM + initUser) -->
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/prefetch.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
